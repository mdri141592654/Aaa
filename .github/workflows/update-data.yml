name: Update market data

on:
  schedule:
    - cron: "10 22 * * 1-6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        run: pip install -r scripts/requirements.txt

      - name: Kursdaten laden
        run: python scripts/fetch_data.py

      - name: Geaenderte Daten committen
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "Keine Aenderungen an den Daten."
          else
            git commit -m "Kursdaten aktualisiert ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
